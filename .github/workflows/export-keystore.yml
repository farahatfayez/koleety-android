name: Export Keystore
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and save keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p keystore_output
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore_output/koleety.keystore
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" > keystore_output/keystore_info.txt
          echo "KEY_ALIAS=$KEY_ALIAS" >> keystore_output/keystore_info.txt
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> keystore_output/keystore_info.txt
          ls -la keystore_output/
      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-export
          path: keystore_output/
          retention-days: 1
